# Wheelchair-Bot — local dev / test / sim containers.
#
# For the Pi production image, see Dockerfile.pi (built with `docker
# buildx build --platform linux/arm64 -f Dockerfile.pi`).
#
# All services use Dockerfile.sim by design — running the Pi image
# locally on a non-Pi host would silently fail to find /dev/gpiomem.

services:

  # Interactive development shell.
  dev:
    build:
      context: .
      dockerfile: Dockerfile.sim
      target: development
    image: wheelchair-bot:sim-dev
    container_name: wheelchair-bot-dev
    volumes:
      - ./wheelchair_bot:/workspace/wheelchair_bot
      - ./wheelchair_controller:/workspace/wheelchair_controller
      - ./src:/workspace/src
      - ./tests:/workspace/tests
      - ./examples:/workspace/examples
      - ./config:/workspace/config
      - ./main.py:/workspace/main.py
      - ./demo.py:/workspace/demo.py
      - pip-cache:/home/developer/.cache/pip
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - PYTHONPATH=/workspace:/workspace/src
      - MOCK_GPIO=1
      - DEVELOPMENT=1
    stdin_open: true
    tty: true
    command: /bin/bash
    networks: [wheelchair-net]

  # CI / local test runner.
  test:
    build:
      context: .
      dockerfile: Dockerfile.sim
      target: testing
    image: wheelchair-bot:sim-test
    container_name: wheelchair-bot-test
    volumes:
      - ./wheelchair_bot:/workspace/wheelchair_bot
      - ./wheelchair_controller:/workspace/wheelchair_controller
      - ./src:/workspace/src
      - ./tests:/workspace/tests
      - ./htmlcov:/workspace/htmlcov
    environment:
      - PYTHONPATH=/workspace:/workspace/src
    networks: [wheelchair-net]

  # No-hardware emulator + tele-op server. NOT for driving real chairs.
  sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
      target: production-sim
    image: wheelchair-bot:sim
    container_name: wheelchair-bot-sim
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - PYTHONPATH=/workspace:/workspace/src
    stdin_open: true
    tty: true
    networks: [wheelchair-net]
    restart: unless-stopped

networks:
  wheelchair-net:
    driver: bridge

volumes:
  pip-cache:
