name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  test-emulator-and-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      # Use the pinned dev.lock so CI installs match local dev exactly
      # (audit gap G-19). Edit requirements/dev.in + run scripts/lock_deps.sh
      # to update.
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements/dev.lock

    # NOTE: lint/format failures fail the build (audit Phase 0, gap G-16).
    # If this breaks first runs, fix the code or temporarily narrow the paths,
    # do not re-introduce `|| true`.
    - name: Lint with ruff
      run: ruff check src/ wheelchair_bot/ wheelchair_controller/

    - name: Format check with black
      run: black --check src/ wheelchair_bot/ wheelchair_controller/ tests/

    - name: Run all tests
      run: python scripts/run_tests.py

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.11'
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install "pytest-cov>=4.0"
        if [ -d "packages/shared" ]; then cd packages/shared && pip install -e ".[dev]" && cd ../..; fi
        if [ -d "packages/backend" ]; then cd packages/backend && pip install -e ".[dev]" && cd ../..; fi

    - name: Install linting tools
      run: pip install "black>=23.0" "ruff>=0.1.0"

    - name: Lint with ruff
      if: ${{ hashFiles('packages/backend') != '' }}
      run: ruff check packages/backend packages/shared

    - name: Format check with black
      if: ${{ hashFiles('packages/backend') != '' }}
      run: black --check packages/backend packages/shared

    - name: Test backend
      if: ${{ hashFiles('packages/backend') != '' }}
      working-directory: packages/backend
      run: pytest --cov --cov-report=xml

    - name: Test shared
      if: ${{ hashFiles('packages/shared') != '' }}
      working-directory: packages/shared
      run: pytest --cov --cov-report=xml

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      if: ${{ hashFiles('package.json') != '' }}
      run: npm install

    - name: Lint frontend
      if: ${{ hashFiles('packages/frontend') != '' }}
      working-directory: packages/frontend
      run: npm run lint

    - name: Build frontend
      if: ${{ hashFiles('packages/frontend') != '' }}
      working-directory: packages/frontend
      run: npm run build

  safety-tests:
    # Hard gate: safety-marked tests MUST pass on every commit.
    # Added in audit Phase 0 to prevent regression of G-01..G-06.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install pytest hypothesis pydantic pyyaml
    - name: Run safety-marked tests
      run: pytest -m safety -v src/tests tests
